services:
  - type: web
    name: clover-api
    env: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"

    healthCheckPath: /health
    healthCheckInterval: 30

    autoDeploy: true
